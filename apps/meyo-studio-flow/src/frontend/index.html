<!doctype html>
<html lang="en">
  <head>
    <base href="/" />
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <script
      src="/node_modules/ace-builds/src-min-noconflict/ace.js"
      type="module"
    ></script>
    <title>Meyo Studio Flow</title>
    <script>
      (() => {
        const isResizeObserverNoise = (message) =>
          message.includes(
            "ResizeObserver loop completed with undelivered notifications",
          ) || message.includes("ResizeObserver loop limit exceeded");

        const showBootError = (message) => {
          if (window.__LF_APP_MOUNTED || isResizeObserverNoise(message)) return;

          const root = document.getElementById("root");
          if (!root) return;

          root.innerHTML = `
            <div style="display:flex;min-height:100vh;align-items:center;justify-content:center;padding:24px;background:#1c1d22;color:#f3f4f6;font-family:Inter,system-ui,sans-serif;">
              <div style="max-width:720px;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:24px;background:rgba(0,0,0,0.18);box-shadow:0 20px 60px rgba(0,0,0,0.35);">
                <h1 style="margin:0 0 12px;font-size:24px;font-weight:700;">Meyo Studio Flow failed to start</h1>
                <p style="margin:0 0 12px;line-height:1.6;color:#d1d5db;">${message}</p>
                <p style="margin:0;line-height:1.6;color:#9ca3af;">If this page works in Chrome or Safari but not in an embedded browser, the embedded browser is likely blocking or failing to run the app JavaScript bundle.</p>
              </div>
            </div>
          `;
        };

        window.addEventListener("error", (event) => {
          const message = event.message || "Unknown startup error.";
          if (isResizeObserverNoise(message)) {
            event.preventDefault();
            return;
          }
          showBootError(message);
        });

        window.addEventListener("unhandledrejection", (event) => {
          const reason =
            typeof event.reason === "string"
              ? event.reason
              : event.reason?.message || "Unhandled promise rejection.";
          showBootError(reason);
        });

        window.setTimeout(() => {
          if (!window.__LF_APP_MOUNTED) {
            showBootError(
              "The HTML shell loaded, but the application never mounted. Check the browser console for JavaScript errors or failed asset requests.",
            );
          }
        }, 15000);
      })();
    </script>
  </head>
  <body id="body" class="dark" style="width: 100%; height: 100%">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div style="width: 100vw; height: 100vh" id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
