[system]
# 从环境变量读取默认语言，未设置时使用默认值。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[service.model.worker]
host = "127.0.0.1"

[models]
[[models.llms]]
name = "${env:ZHIPU_MODEL_NAME:-glm-4.5}"
provider = "proxy/zhipu"
api_base = "${env:ZHIPUAI_BASE_URL:-https://open.bigmodel.cn/api/paas/v4}"
api_key = "${env:ZHIPUAI_API_KEY}"
