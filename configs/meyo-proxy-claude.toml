[system]
# 从环境变量读取默认语言，未设置时使用默认值。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[service.model.worker]
host = "127.0.0.1"

[models]
[[models.llms]]
name = "${env:ANTHROPIC_MODEL_NAME:-claude-sonnet-4-20250514}"
provider = "proxy/claude"
api_base = "${env:ANTHROPIC_BASE_URL:-https://api.anthropic.com}"
api_key = "${env:ANTHROPIC_API_KEY}"
