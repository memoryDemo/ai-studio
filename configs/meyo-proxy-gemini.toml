[system]
# 从环境变量读取默认语言，未设置时使用默认值。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[service.model.worker]
host = "127.0.0.1"

[models]
[[models.llms]]
name = "${env:GEMINI_MODEL_NAME:-gemini-2.0-flash}"
provider = "proxy/gemini"
api_base = "${env:GEMINI_PROXY_API_BASE:-}"
api_key = "${env:GEMINI_PROXY_API_KEY}"
