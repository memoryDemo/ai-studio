[system]
# 从环境变量读取默认语言，未设置时使用默认值。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

# 服务配置
[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[rag.storage]
[rag.storage.vector]
type = "chroma"
persist_path = "pilot/data"

# 模型配置
[models]
[[models.llms]]
name = "Qwen/Qwen3-0.6B-MLX-4bit"
provider = "mlx"
# 未配置时会从 Hugging Face 模型仓库下载。
# 如需使用本地模型路径，取消下面配置的注释。
# https://huggingface.co/Qwen/Qwen3-0.6B-MLX-4bit
# path = "本地模型路径"

[[models.embeddings]]
name = "BAAI/bge-large-zh-v1.5"
provider = "hf"
# 未配置时会从 Hugging Face 模型仓库下载。
# 如需使用本地模型路径，取消下面配置的注释。
# path = "本地模型路径"
