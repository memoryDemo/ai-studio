[system]
# 从环境变量读取默认语言，未设置时使用中文。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

# 服务配置
[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[service.model.worker]
host = "127.0.0.1"

[service.model.api]
controller_addr = "http://127.0.0.1:5670"

[rag.storage]
[rag.storage.vector]
type = "chroma"
persist_path = "pilot/data"

# 模型配置
[models]
[[models.llms]]
name = "Pro/zai-org/GLM-5.1"
provider = "proxy/siliconflow"
api_key = "${env:SILICONFLOW_API_KEY}"

[[models.embeddings]]
name = "Qwen/Qwen3-Embedding-8B"
provider = "proxy/siliconflow"
backend = "Qwen/Qwen3-Embedding-8B"
api_key = "${env:SILICONFLOW_API_KEY}"

[[models.rerankers]]
name = "Qwen/Qwen3-Reranker-8B"
provider = "proxy/siliconflow"
api_key = "${env:SILICONFLOW_API_KEY}"
