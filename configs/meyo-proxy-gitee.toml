[system]
# 从环境变量读取默认语言，未设置时使用默认值。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[service.model.worker]
host = "127.0.0.1"

[models]
[[models.llms]]
name = "${env:GITEE_MODEL_NAME:-Qwen2.5-72B-Instruct}"
provider = "proxy/gitee"
api_base = "${env:GITEE_API_BASE:-https://ai.gitee.com/v1}"
api_key = "${env:GITEE_API_KEY}"
