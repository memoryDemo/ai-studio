[system]
# 从环境变量读取默认语言，未设置时使用默认值。
language = "${env:MEYO_LANG:-zh}"
api_keys = []
encrypt_key = "${env:MEYO_ENCRYPT_KEY:-your_secret_key}"

[service.web]
host = "0.0.0.0"
port = 5670

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/meyo.db"

[service.model.worker]
host = "127.0.0.1"

[models]
[[models.llms]]
name = "${env:YI_MODEL_NAME:-yi-lightning}"
provider = "proxy/yi"
api_base = "${env:YI_API_BASE:-https://api.lingyiwanwu.com/v1}"
api_key = "${env:YI_API_KEY}"
