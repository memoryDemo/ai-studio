[project]
name = "ai-studio-serve"
version = "0.1.0"
description = "Service layer for AI Studio."
requires-python = ">=3.11"
dependencies = [
    "ai-studio-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_studio_serve"]
