<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meyo</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Helvetica Neue", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f8fafc 0%, #dbeafe 100%);
        color: #0f172a;
      }

      main {
        width: min(640px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
      }

      p {
        margin: 0;
        font-size: 1.05rem;
        line-height: 1.6;
      }

      code {
        padding: 2px 8px;
        border-radius: 999px;
        background: #e2e8f0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>
        Meyo minimal web shell is running.
        API health check: <code>/api/healthz</code>
      </p>
    </main>
  </body>
</html>
