[project]
name = "meyo-app"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "jingwei.guan", email = "memory1992@live.com" }
]
requires-python = ">=3.12"
dependencies = [
    # 默认只声明 workspace 包关系，具体能力依赖放到 optional extras 里按需打开。
    "meyo",
    "meyo-accelerator",
    "meyo-client",
    "meyo-ext",
    "meyo-sandbox",
    "meyo-serve",
]

[project.optional-dependencies]
base = [
    # 后端基础启动能力：CLI、HTTP API、配置、数据库、Runtime、MCP，不绑定具体模型供应商。
    "meyo[cli,client,framework,runtime,simple_framework,tool]",
]
observability = [
    # 观测能力单独打开，避免本地最小开发环境默认安装链路追踪依赖。
    "meyo[observability]",
]
siliconflow = [
    # 硅基流动 LLM 使用 OpenAI-compatible 协议，embedding/rerank 当前是直接 HTTP 调用。
    "meyo[proxy_openai]",
]
multi_proxy = [
    # 当前已迁移的非 OpenAI-compatible LLM provider SDK。
    "meyo[proxy_anthropic,proxy_google,proxy_ollama,proxy_openai]",
    "meyo-ext[model_tongyi]",
]
pg_milvus_neo4j = [
    # PostgreSQL 元数据、Milvus 向量库、Neo4j 图数据库组合。
    "meyo-ext[storage_postgres,storage_milvus,storage_neo4j]",
]
storage_common = [
    # 常用存储扩展：PostgreSQL、Redis、Milvus、Neo4j、S3/MinIO。
    "meyo-ext[file_s3,storage_milvus,storage_neo4j,storage_postgres,storage_redis]",
]

[build-system]
# uv 的 PEP 517 构建后端，只在构建/安装本 package 时使用。
requires = ["uv_build>=0.11.7,<0.12.0"]
build-backend = "uv_build"
