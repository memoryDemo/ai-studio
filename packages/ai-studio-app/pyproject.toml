[project]
name = "ai-studio-app"
version = "0.1.0"
description = "Application wiring for AI Studio."
requires-python = ">=3.11"
dependencies = [
    "ai-studio-core",
    "ai-studio-ext",
    "ai-studio-client",
    "ai-studio-serve",
    "ai-studio-sandbox",
    "ai-studio-acc-auto",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ai_studio_app"]
